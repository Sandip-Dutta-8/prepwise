version: 2
updates:
  # Keep npm dependencies current (security patches especially matter here:
  # Clerk, Arcjet, Prisma are all auth/security-relevant packages).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Keep the GitHub Actions themselves pinned-but-current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
